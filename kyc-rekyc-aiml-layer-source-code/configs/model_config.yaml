risk_model:
  algorithm: RandomForestClassifier
  target: risk_label
  features:
    - age
    - monthly_income
    - loan_amount
    - document_mismatch_count
    - sanctions_hit
    - pep_hit
    - adverse_media_hit
    - geo_distance_km
    - rekyc_overdue_days
fraud_model:
  algorithm: IsolationForest
  contamination: 0.08
ocr:
  mode: mock_first
  confidence_threshold: 0.72
agents:
  maker_checker_required_for: [HIGH, CRITICAL]
  edd_required_for: [HIGH, CRITICAL]
